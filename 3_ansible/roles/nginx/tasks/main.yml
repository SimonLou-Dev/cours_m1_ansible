---
- name: Installing nginx
  dnf:
    name: nginx
    state: latest

- name: Creating web root directory
  file:
    state: directory
    path: "{{ nginx.root }}"
    mode: "0755"

- name: Creating HTML
  template:
    src: index.html.j2
    dest: "{{ nginx.root }}/index.html"
    mode: "0644"
  notify: restart nginx

- name: Configuring nginx
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: "0644"
    validate: "nginx -t -c %s"
  notify: restart nginx

- name: Opening firewall port
  firewalld:
    port: "{{ nginx.port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
