---
- name: Install dnsmasq
  dnf:
    name: dnsmasq
    state: present

- name: Configure dnsmasq
  template:
    src: dnsmasq.conf.j2
    dest: /etc/dnsmasq.conf
    backup: yes
    validate: dnsmasq --test %s
  notify: Restart and enable dnsmasq

- name: Open DNS firewall ports
  firewalld:
    service: dns
    permanent: yes
    state: enabled
    immediate: yes

- name: Open DHCP firewall ports
  firewalld:
    service: dhcp
    permanent: yes
    state: enabled
    immediate: yes
  when: ansible_facts["hostname"] in groups["dns-primary"]
