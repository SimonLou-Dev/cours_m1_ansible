proxmox:
  node: pve-a-2 # nœud par défaut
  storage: local-lvm # storage par défaut (surchargeable par VM avec node: / storage:)

vms:
  - name: web-01
    template: pkr-fedora-41-1.4
    vmid: 200
    cores: 2
    memory: 2048
    disk: 20G
    cloudinit: true
    storage: zfs-store
    network:
      ip: 172.16.0.10/24
      gateway: 172.16.0.1
    groups:
      - nginx
      - dns-master

  - name: dns-02
    template: pkr-fedora-41-1.4
    vmid: 201
    cores: 2
    memory: 2048
    disk: 20G
    cloudinit: true
    storage: zfs-store
    network:
      ip: 172.16.0.11/24
      gateway: 172.16.0.1
    groups:
      - dns-slave
