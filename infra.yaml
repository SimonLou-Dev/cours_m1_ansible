proxmox:
  node: pve # nœud par défaut
  storage: local-lvm # storage par défaut (surchargeable par VM avec node: / storage:)

vms:
  - name: web-01
    template: pkr-fedora-41-1.4
    vmid: 200
    cores: 2
    memory: 2048
    disk: 10G
    cloudinit: false
    storage: local-lvm
    groups:
      - nginx
      - dns-primary

  - name: dns-02
    template: pkr-fedora-41-1.4
    vmid: 201
    cores: 2
    memory: 2048
    disk: 10G
    cloudinit: false
    storage: local-lvm
    groups:
      - dns-secondary

  - name: mon-01
    template: pkr-fedora-41-1.4
    vmid: 202
    cores: 2
    memory: 2048
    disk: 10G
    cloudinit: false
    storage: local-lvm
    groups:
      - monitoring
